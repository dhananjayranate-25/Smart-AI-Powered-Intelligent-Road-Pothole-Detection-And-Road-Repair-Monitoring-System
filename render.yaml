databases:
  - name: pothole-db
    databaseName: pothole_db
    user: pothole_user
    plan: free

services:
  - type: web
    name: pothole-ai-web
    env: python
    plan: free
    buildCommand: "./build.sh"
    startCommand: "gunicorn app:app --bind 0.0.0.0:$PORT --timeout 120"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: pothole-db
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.10.12
